<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UptimeDown</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --accent:   #3b82f6;
      --green:    #22c55e;
      --yellow:   #eab308;
      --red:      #ef4444;
      --orange:   #f97316;
      --purple:   #a855f7;
      --cyan:     #06b6d4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    #status {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
    }
    #status.ok    .dot { background: var(--green); }
    #status.error .dot { background: var(--red); }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    main {
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }

    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px 12px;
    }

    .chart-box.full-width {
      grid-column: 1 / -1;
    }

    .chart-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
      margin-bottom: 12px;
    }

    .chart-wrap {
      position: relative;
      height: 200px;
    }

    .chart-box.full-width .chart-wrap {
      height: 180px;
    }

    #error-banner {
      display: none;
      background: #3b1010;
      border: 1px solid var(--red);
      color: #fca5a5;
      padding: 10px 18px;
      margin: 16px 24px 0;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>UptimeDown</h1>
  <div id="status">
    <span class="dot"></span>
    <span id="status-text">Loading…</span>
    <button id="refresh-btn" onclick="refresh()">Refresh</button>
  </div>
</header>

<div id="error-banner"></div>

<main>
  <div class="chart-box">
    <div class="chart-title">CPU Usage (%)</div>
    <div class="chart-wrap"><canvas id="cpuChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Memory (GB)</div>
    <div class="chart-wrap"><canvas id="memChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Disk I/O (MB/s)</div>
    <div class="chart-wrap"><canvas id="diskChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Disk I/O Operations (/sec)</div>
    <div class="chart-wrap"><canvas id="iopsChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Network Throughput (MB/s)</div>
    <div class="chart-wrap"><canvas id="netChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Network Packets (/sec)</div>
    <div class="chart-wrap"><canvas id="netPktsChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Network Errors & Drops</div>
    <div class="chart-wrap"><canvas id="netErrorChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">System Load Average</div>
    <div class="chart-wrap"><canvas id="loadChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Context Switches & Processes</div>
    <div class="chart-wrap"><canvas id="ctxChart"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Softirqs (/sec)</div>
    <div class="chart-wrap"><canvas id="softirqChart"></canvas></div>
  </div>

  <div class="chart-box full-width">
    <div class="chart-title">Filesystem Usage (%)</div>
    <div class="chart-wrap"><canvas id="fsChart"></canvas></div>
  </div>
</main>

<script>
// ── Configuration ────────────────────────────────────────────────────────────
const CONFIG = {
  refreshInterval: 30,   // seconds between auto-refreshes (0 = disabled)
};
// Note: server's --max-files limit controls how many files are loaded

// ── Chart instances ──────────────────────────────────────────────────────────
const charts = {};

// ── Cached data points and loaded file tracking ───────────────────────────────
let cachedPoints = [];
const loadedFiles = new Set();


// ── Dataset hidden-state persistence ─────────────────────────────────────────
// Tracks which legend items have been clicked off, persisted to localStorage.
// Keys: chartId → { datasetLabel: true } (only hidden ones stored)
const hiddenDatasets = {};

function loadHiddenState() {
  const saved = localStorage.getItem('hiddenDatasets');
  if (saved) {
    try { Object.assign(hiddenDatasets, JSON.parse(saved)); } catch (e) {}
  }
}

function saveHiddenState(chartId, chart) {
  const hidden = {};
  chart.data.datasets.forEach((ds, i) => {
    if (!chart.isDatasetVisible(i)) hidden[ds.label] = true;
  });
  hiddenDatasets[chartId] = hidden;
  localStorage.setItem('hiddenDatasets', JSON.stringify(hiddenDatasets));
}

loadHiddenState();


// ── Chart.js defaults ────────────────────────────────────────────────────────
Chart.defaults.color = '#64748b';
Chart.defaults.borderColor = '#2a2d3a';
Chart.defaults.font.family = 'ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace';
Chart.defaults.font.size = 11;

// ── Colour palette ───────────────────────────────────────────────────────────
const C = {
  blue:   '#3b82f6',
  green:  '#22c55e',
  yellow: '#eab308',
  red:    '#ef4444',
  orange: '#f97316',
  purple: '#a855f7',
  cyan:   '#06b6d4',
  muted:  '#64748b',
};

// Palette for assigning one color per device/interface. Read/RX = solid line,
// Write/TX = dashed line with the same color.
const SERIES_PALETTE = [C.blue, C.green, C.orange, C.purple, C.cyan, C.red, C.yellow, C.muted];
function seriesColor(idx) { return SERIES_PALETTE[idx % SERIES_PALETTE.length]; }

function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Shared axis/plugin config ────────────────────────────────────────────────
function timeXAxis() {
  return {
    type: 'time',
    time: { tooltipFormat: 'HH:mm:ss', displayFormats: { second: 'HH:mm:ss', minute: 'HH:mm' } },
    ticks: { maxTicksLimit: 8 },
    grid: { color: '#2a2d3a' },
  };
}

function yAxis(label, min) {
  return {
    min: min ?? 0,
    title: { display: !!label, text: label, color: '#64748b' },
    grid: { color: '#2a2d3a' },
    ticks: { maxTicksLimit: 6 },
  };
}

function lineDataset(label, color, data, opts) {
  return {
    label,
    data,
    borderColor: color,
    backgroundColor: rgba(color, 0.12),
    fill: opts?.fill ?? false,
    tension: 0.3,
    pointRadius: 2,
    pointHoverRadius: 4,
    borderWidth: 1.5,
    ...opts,
  };
}

// Creates or replaces a chart. Preserves per-dataset hidden state across
// re-renders: live chart state > localStorage > dataset default (hidden: true).
function makeChart(id, type, data, options) {
  const ctx = document.getElementById(id).getContext('2d');

  // Capture live hidden state before destroy (user may have toggled legend)
  const liveHidden = {};
  if (charts[id]) {
    charts[id].data.datasets.forEach((ds, i) => {
      liveHidden[ds.label] = !charts[id].isDatasetVisible(i);
    });
    charts[id].destroy();
  }

  // Apply hidden state: live > localStorage > dataset default
  const savedHidden = hiddenDatasets[id] || {};
  data.datasets.forEach(ds => {
    if (ds.label in liveHidden) {
      ds.hidden = liveHidden[ds.label];
    } else if (savedHidden[ds.label]) {
      ds.hidden = true;
    }
    // else: ds.hidden stays as set in the dataset definition (default)
  });

  // Inject legend click handler that persists hidden state
  const legendClick = (e, legendItem, legend) => {
    Chart.defaults.plugins.legend.onClick(e, legendItem, legend);
    saveHiddenState(id, legend.chart);
  };

  const opts = {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    ...options,
    plugins: {
      ...options.plugins,
      legend: {
        ...options.plugins?.legend,
        onClick: legendClick,
      },
    },
  };

  charts[id] = new Chart(ctx, { type, data, options: opts });
  return charts[id];
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function fetchFiles() {
  const res = await fetch('/api/files');
  if (!res.ok) throw new Error(`/api/files → ${res.status}`);
  return res.json();
}

async function fetchData(filename) {
  const res = await fetch(`/api/data/${encodeURIComponent(filename)}`);
  if (!res.ok) throw new Error(`/api/data/${filename} → ${res.status}`);
  return res.json();
}

// Fetch only files not yet seen, merge into cachedPoints. Returns count of new points added.
async function fetchNewData() {
  const files = await fetchFiles();
  const newFiles = files.filter(f => !loadedFiles.has(f));
  if (!newFiles.length) return 0;

  const results = await Promise.all(newFiles.map(f => fetchData(f).catch(() => null)));
  const newPoints = results.filter(Boolean);
  newFiles.forEach(f => loadedFiles.add(f));

  if (newPoints.length) {
    cachedPoints = [...cachedPoints, ...newPoints]
      .sort((a, b) => a.collected_at - b.collected_at);
  }
  return newPoints.length;
}

// ── CPU chart ────────────────────────────────────────────────────────────────
// Computes percentage from tick deltas between consecutive samples.
// Keys (Linux): user_ticks, nice_ticks, sys_ticks, idle_ticks, iowait_ticks,
//               irq_ticks, softirq_ticks, steal_ticks
// Keys (AIX):   user_ticks, sys_ticks, idle_ticks, iowait_ticks
function buildCpuSeries(points) {
  const series = {
    user: [], nice: [], sys: [], iowait: [], irq: [], softirq: [], steal: []
  };
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1].cpustats || {};
    const curr = points[i].cpustats || {};
    const x = new Date(points[i].collected_at * 1000);

    const du = (curr.user_ticks    || 0) - (prev.user_ticks    || 0);
    const dn = (curr.nice_ticks    || 0) - (prev.nice_ticks    || 0);
    const ds = (curr.sys_ticks     || 0) - (prev.sys_ticks     || 0);
    const di = (curr.idle_ticks    || 0) - (prev.idle_ticks    || 0);
    const dw = (curr.iowait_ticks  || 0) - (prev.iowait_ticks  || 0);
    const dr = (curr.irq_ticks     || 0) - (prev.irq_ticks     || 0);
    const dq = (curr.softirq_ticks || 0) - (prev.softirq_ticks || 0);
    const dt = (curr.steal_ticks   || 0) - (prev.steal_ticks   || 0);

    const total = du + dn + ds + di + dw + dr + dq + dt;
    if (total <= 0) continue;

    const pct = v => parseFloat((v / total * 100).toFixed(2));
    series.user.push(    { x, y: pct(du) });
    series.nice.push(    { x, y: pct(dn) });
    series.sys.push(     { x, y: pct(ds) });
    series.iowait.push(  { x, y: pct(dw) });
    series.irq.push(     { x, y: pct(dr) });
    series.softirq.push( { x, y: pct(dq) });
    series.steal.push(   { x, y: pct(dt) });
  }
  return series;
}

function renderCpu(points) {
  const series = buildCpuSeries(points);

  makeChart('cpuChart', 'line', {
    datasets: [
      lineDataset('User',     C.blue,   series.user,    { fill: true }),
      lineDataset('System',   C.orange, series.sys,     { fill: true }),
      lineDataset('I/O Wait', C.yellow, series.iowait,  { fill: true }),
      lineDataset('Nice',     C.cyan,   series.nice,    { fill: true, hidden: true }),
      lineDataset('IRQ',      C.red,    series.irq,     { fill: true, hidden: true }),
      lineDataset('Soft IRQ', C.purple, series.softirq, { fill: true, hidden: true }),
      lineDataset('Steal',    C.green,  series.steal,   { fill: true, hidden: true }),
    ],
  }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis(null, 0), max: 100, stacked: false,
           ticks: { callback: v => v + '%', maxTicksLimit: 6 },
           grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Memory chart ─────────────────────────────────────────────────────────────
// Combined view: high-level (used/available/total) + breakdown (buffers/cached/swap).
// Click legend items to show/hide. Nice/IRQ/Steal/totals start hidden.
function renderMemory(points) {
  const used = [], avail = [], total = [], buffers = [], cached = [], swap = [], totalSwap = [], swapFree = [];
  for (const p of points) {
    const mem = p.memory?.memory || p.memory || {};
    const x = new Date(p.collected_at * 1000);
    const tot = mem.mem_total || 0;
    const free = mem.mem_free || 0;
    const av   = mem.mem_available ?? free;
    const gb = v => parseFloat((v / 1073741824).toFixed(3));
    used.push(     { x, y: gb(tot - av) });
    avail.push(    { x, y: gb(av) });
    cached.push(   { x, y: gb(mem.cached || 0) });
    swap.push(     { x, y: gb((mem.swap_total || 0) - (mem.swap_free || 0)) });
    buffers.push(  { x, y: gb(mem.buffers || 0) });
    total.push(    { x, y: gb(tot) });
    totalSwap.push({ x, y: gb(mem.swap_total || 0) });
    swapFree.push( { x, y: gb(mem.swap_free || 0) });
  }

  makeChart('memChart', 'line', {
    datasets: [
      lineDataset('Used',       C.red,    used      ),
      lineDataset('Available',  C.green,  avail     ),
      lineDataset('Cached',     C.blue,   cached    ),
      lineDataset('Swap Used',  C.orange, swap      ),
      lineDataset('Buffers',    C.cyan,   buffers,   { hidden: true }),
      lineDataset('Total',      C.muted,  total,     { borderDash: [4,4], hidden: true }),
      lineDataset('Total Swap', C.purple, totalSwap, { borderDash: [4,4], hidden: true }),
      lineDataset('Swap Free',  C.yellow, swapFree,  { hidden: true }),
    ],
  }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis('GB', 0), ticks: { callback: v => v.toFixed(0) + ' GB', maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} GB` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Disk I/O chart ───────────────────────────────────────────────────────────
// Per-device lines. Read = solid, write = dashed, same colour per device.
// First 3 devices visible by default; extras start hidden.
function renderDisk(points) {
  const devices = new Set();
  points.forEach(p => Object.keys(p.disks || {}).forEach(d => devices.add(d)));
  const devList = Array.from(devices).sort();

  const series = {};
  devList.forEach(d => { series[d] = { read: [], write: [] }; });

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1].disks || {};
    const curr = points[i].disks || {};
    const x = new Date(points[i].collected_at * 1000);
    const dt = points[i].collected_at - points[i - 1].collected_at;
    if (dt <= 0) continue;
    const mbps = v => parseFloat((v * 512 / 1048576 / dt).toFixed(3));
    for (const dev of devList) {
      const c = curr[dev] || {}, p = prev[dev] || {};
      series[dev].read.push( { x, y: mbps((c.read_sectors  || 0) - (p.read_sectors  || 0)) });
      series[dev].write.push({ x, y: mbps((c.write_sectors || 0) - (p.write_sectors || 0)) });
    }
  }

  const datasets = [];
  devList.forEach((dev, i) => {
    const color  = seriesColor(i);
    const hidden = i >= 3;
    datasets.push(lineDataset(`${dev} read`,  color, series[dev].read,  { hidden }));
    datasets.push(lineDataset(`${dev} write`, color, series[dev].write, { borderDash: [4, 4], hidden }));
  });

  makeChart('diskChart', 'line', { datasets }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis('MB/s', 0), ticks: { maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} MB/s` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Network chart ────────────────────────────────────────────────────────────
// Per-interface lines. RX = solid, TX = dashed, same colour per interface.
// First 2 interfaces visible by default; loopback always excluded.
function renderNetwork(points) {
  const ifaces = new Set();
  points.forEach(p => Object.keys(p.network || {}).forEach(i => { if (i !== 'lo') ifaces.add(i); }));
  const ifaceList = Array.from(ifaces).sort();

  const series = {};
  ifaceList.forEach(i => { series[i] = { rx: [], tx: [] }; });

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1].network || {};
    const curr = points[i].network || {};
    const x = new Date(points[i].collected_at * 1000);
    const dt = points[i].collected_at - points[i - 1].collected_at;
    if (dt <= 0) continue;
    const mbps = v => parseFloat((v / 1048576 / dt).toFixed(4));
    for (const iface of ifaceList) {
      const c = curr[iface] || {}, p = prev[iface] || {};
      series[iface].rx.push({ x, y: mbps((c.ibytes || 0) - (p.ibytes || 0)) });
      series[iface].tx.push({ x, y: mbps((c.obytes || 0) - (p.obytes || 0)) });
    }
  }

  const datasets = [];
  ifaceList.forEach((iface, i) => {
    const color  = seriesColor(i);
    const hidden = i >= 2;
    datasets.push(lineDataset(`${iface} RX`, color, series[iface].rx, { fill: true, hidden }));
    datasets.push(lineDataset(`${iface} TX`, color, series[iface].tx, { borderDash: [4, 4], hidden }));
  });

  makeChart('netChart', 'line', { datasets }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis('MB/s', 0), ticks: { maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(3)} MB/s` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Filesystem chart ─────────────────────────────────────────────────────────
// Uses the most recent snapshot only (point-in-time, not a time series).
function renderFilesystems(points) {
  if (!points.length) return;
  const latest = points[points.length - 1];
  const fses = latest.filesystems || {};

  // Get mounted filesystems with usage data, sort by usage descending
  const allMounts = Object.keys(fses)
    .filter(mp => fses[mp].mounted !== false && fses[mp].pct_used != null)
    .sort((a, b) => (fses[b].pct_used || 0) - (fses[a].pct_used || 0));

  // Cap at 20 bars; with many filesystems (e.g. WPAR hosts), more is unreadable
  const maxShow = 20;
  const mounts = allMounts.slice(0, maxShow);
  const truncated = allMounts.length > maxShow;

  const pctUsed  = mounts.map(mp => parseFloat((fses[mp].pct_used || 0).toFixed(1)));

  // Colour bars by usage level
  const barColors = pctUsed.map(v =>
    v >= 90 ? rgba(C.red,    0.85) :
    v >= 75 ? rgba(C.yellow, 0.85) :
              rgba(C.green,  0.85)
  );

  // Set chart height dynamically so bars are readable regardless of count
  const barHeight = 24;  // px per bar
  const wrapPad   = 40;  // top/bottom padding
  document.getElementById('fsChart').parentElement.style.height =
    Math.max(120, mounts.length * barHeight + wrapPad) + 'px';

  const chartTitle = truncated ? `Top ${maxShow} of ${allMounts.length} filesystems` : `All ${mounts.length} filesystems`;
  makeChart('fsChart', 'bar', {
    labels: mounts,
    datasets: [
      {
        label: 'Used %',
        data: pctUsed,
        backgroundColor: barColors,
        borderColor: barColors,
        borderWidth: 0,
        borderRadius: 3,
      },
    ],
  }, {
    indexAxis: 'y',
    scales: {
      x: {
        min: 0, max: 100,
        grid: { color: '#2a2d3a' },
        ticks: { callback: v => v + '%', maxTicksLimit: 6 },
      },
      y: {
        grid: { display: false },
        ticks: { font: { size: 11 } },
      },
    },
    plugins: {
      tooltip: {
        callbacks: {
          label: ctx => {
            const mp = ctx.label;
            const fs = fses[mp] || {};
            const gb = v => v ? (v / 1073741824).toFixed(1) + ' GB' : '?';
            return [
              `  Used: ${ctx.parsed.x}%`,
              `  Total: ${gb(fs.bytes_total)}`,
              `  Available: ${gb(fs.bytes_available || fs.bytes_free)}`,
              `  Type: ${fs.vfs || '?'}`,
            ];
          },
          title: ctx => ctx[0].label,
          afterLabel: () => truncated ? `(showing top ${maxShow} by usage)` : '',
        },
      },
      legend: { display: false },
      subtitle: {
        text: chartTitle,
        display: true,
        color: '#64748b',
        font: { size: 11 },
      },
    },
  });
}

// ── Disk IOPS chart ──────────────────────────────────────────────────────────
// Per-device lines. Read = solid, write = dashed, same colour per device.
function renderIOPS(points) {
  const devices = new Set();
  points.forEach(p => Object.keys(p.disks || {}).forEach(d => devices.add(d)));
  const devList = Array.from(devices).sort();

  const series = {};
  devList.forEach(d => { series[d] = { read: [], write: [] }; });

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1].disks || {};
    const curr = points[i].disks || {};
    const x = new Date(points[i].collected_at * 1000);
    const dt = points[i].collected_at - points[i - 1].collected_at;
    if (dt <= 0) continue;
    for (const dev of devList) {
      const c = curr[dev] || {}, p = prev[dev] || {};
      series[dev].read.push( { x, y: parseFloat(((c.read_ios  || 0) - (p.read_ios  || 0)) / dt).toFixed(2) });
      series[dev].write.push({ x, y: parseFloat(((c.write_ios || 0) - (p.write_ios || 0)) / dt).toFixed(2) });
    }
  }

  const datasets = [];
  devList.forEach((dev, i) => {
    const color  = seriesColor(i);
    const hidden = i >= 3;
    datasets.push(lineDataset(`${dev} read`,  color, series[dev].read,  { hidden }));
    datasets.push(lineDataset(`${dev} write`, color, series[dev].write, { borderDash: [4, 4], hidden }));
  });

  makeChart('iopsChart', 'line', { datasets }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis('ops/sec', 0), ticks: { maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} ops/s` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Network packets chart ────────────────────────────────────────────────────
// Per-interface lines. RX = solid, TX = dashed, same colour per interface.
function renderNetworkPackets(points) {
  const ifaces = new Set();
  points.forEach(p => Object.keys(p.network || {}).forEach(i => { if (i !== 'lo') ifaces.add(i); }));
  const ifaceList = Array.from(ifaces).sort();

  const series = {};
  ifaceList.forEach(i => { series[i] = { rx: [], tx: [] }; });

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1].network || {};
    const curr = points[i].network || {};
    const x = new Date(points[i].collected_at * 1000);
    const dt = points[i].collected_at - points[i - 1].collected_at;
    if (dt <= 0) continue;
    for (const iface of ifaceList) {
      const c = curr[iface] || {}, p = prev[iface] || {};
      series[iface].rx.push({ x, y: parseFloat(((c.ipackets || 0) - (p.ipackets || 0)) / dt).toFixed(0) });
      series[iface].tx.push({ x, y: parseFloat(((c.opackets || 0) - (p.opackets || 0)) / dt).toFixed(0) });
    }
  }

  const datasets = [];
  ifaceList.forEach((iface, i) => {
    const color  = seriesColor(i);
    const hidden = i >= 2;
    datasets.push(lineDataset(`${iface} RX`, color, series[iface].rx, { hidden }));
    datasets.push(lineDataset(`${iface} TX`, color, series[iface].tx, { borderDash: [4, 4], hidden }));
  });

  makeChart('netPktsChart', 'line', { datasets }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis('pkts/sec', 0), ticks: { maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} pkts/s` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Network errors & drops ───────────────────────────────────────────────────
// Per-interface lines. Errors = solid, drops = dashed, same colour per interface.
function renderNetworkErrors(points) {
  const ifaces = new Set();
  points.forEach(p => Object.keys(p.network || {}).forEach(i => { if (i !== 'lo') ifaces.add(i); }));
  const ifaceList = Array.from(ifaces).sort();

  const series = {};
  ifaceList.forEach(i => { series[i] = { errors: [], drops: [] }; });

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1].network || {};
    const curr = points[i].network || {};
    const x = new Date(points[i].collected_at * 1000);
    for (const iface of ifaceList) {
      const c = curr[iface] || {}, p = prev[iface] || {};
      const de = ((c.ierrors || 0) + (c.oerrors || 0)) - ((p.ierrors || 0) + (p.oerrors || 0));
      const dd = ((c.idrop   || 0) + (c.odrop   || 0)) - ((p.idrop   || 0) + (p.odrop   || 0));
      series[iface].errors.push({ x, y: Math.max(0, de) });
      series[iface].drops.push( { x, y: Math.max(0, dd) });
    }
  }

  const datasets = [];
  ifaceList.forEach((iface, i) => {
    const color  = seriesColor(i);
    const hidden = i >= 2;
    datasets.push(lineDataset(`${iface} errors`, color, series[iface].errors, { hidden }));
    datasets.push(lineDataset(`${iface} drops`,  color, series[iface].drops,  { borderDash: [4, 4], hidden }));
  });

  makeChart('netErrorChart', 'line', { datasets }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis('count', 0), ticks: { maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── System load average ──────────────────────────────────────────────────────
function renderLoad(points) {
  const load1 = [], load5 = [], load15 = [];
  for (const p of points) {
    const cpu = p.cpustats || {};
    const x = new Date(p.collected_at * 1000);
    load1.push(  { x, y: parseFloat((cpu.loadavg_1 || 0).toFixed(2)) });
    load5.push(  { x, y: parseFloat((cpu.loadavg_5 || 0).toFixed(2)) });
    load15.push( { x, y: parseFloat((cpu.loadavg_15 || 0).toFixed(2)) });
  }
  makeChart('loadChart', 'line', {
    datasets: [
      lineDataset('1 min',  C.blue,   load1,  { fill: true }),
      lineDataset('5 min',  C.green,  load5 ),
      lineDataset('15 min', C.orange, load15 ),
    ],
  }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis('load', 0), ticks: { maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Context switches & processes ─────────────────────────────────────────────
function renderContext(points) {
  const ctxt = [], procs = [], running = [];
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1].cpustats || {};
    const curr = points[i].cpustats || {};
    const x = new Date(points[i].collected_at * 1000);
    const dt = points[i].collected_at - points[i - 1].collected_at;
    if (dt <= 0) continue;
    const dctxt = ((curr.ctxt || 0) - (prev.ctxt || 0)) / dt;
    ctxt.push(   { x, y: parseFloat(dctxt.toFixed(0)) });
    procs.push(  { x, y: curr.processes || 0 });
    running.push( { x, y: curr.procs_running || 0 });
  }
  makeChart('ctxChart', 'line', {
    datasets: [
      lineDataset('Context switches/sec', C.blue,   ctxt,    { fill: true, yAxisID: 'y' }),
      lineDataset('Total processes',      C.green,  procs,   { yAxisID: 'y1' }),
      lineDataset('Running processes',    C.red,    running, { yAxisID: 'y1' }),
    ],
  }, {
    scales: {
      x: timeXAxis(),
      y:  { ...yAxis('ctxt/sec', 0), position: 'left', ticks: { maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
      y1: { ...yAxis('processes', 0), position: 'right', ticks: { maxTicksLimit: 6 }, grid: { display: false } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Softirq chart ────────────────────────────────────────────────────────────
// Aggregates softirq counts across all CPUs, computes rate (per second)
function renderSoftirq(points) {
  const softirqs = {};
  const softirqColors = {
    'TIMER':        C.blue,
    'NET_TX':       C.green,
    'NET_RX':       C.yellow,
    'BLOCK':        C.cyan,
    'BLOCK_IOPOLL': C.purple,
    'TASKLET':      C.red,
    'SCHED':        C.orange,
    'HRTIMER':      C.muted,
    'RCU':          '#8b5cf6',
  };

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1].cpustats || {};
    const curr = points[i].cpustats || {};
    const x = new Date(points[i].collected_at * 1000);
    const dt = points[i].collected_at - points[i - 1].collected_at;
    if (dt <= 0) continue;

    // Aggregate softirqs from all CPUs
    const prevSoftirqs = {};
    const currSoftirqs = {};

    for (const key in prev) {
      if (key.startsWith('cpu') && typeof prev[key] === 'object' && prev[key].softirqs) {
        for (const [irq, count] of Object.entries(prev[key].softirqs)) {
          prevSoftirqs[irq] = (prevSoftirqs[irq] || 0) + (count || 0);
        }
      }
    }
    for (const key in curr) {
      if (key.startsWith('cpu') && typeof curr[key] === 'object' && curr[key].softirqs) {
        for (const [irq, count] of Object.entries(curr[key].softirqs)) {
          currSoftirqs[irq] = (currSoftirqs[irq] || 0) + (count || 0);
        }
      }
    }

    for (const irq of Object.keys(currSoftirqs)) {
      if (!(irq in softirqs)) softirqs[irq] = [];
      const delta = (currSoftirqs[irq] || 0) - (prevSoftirqs[irq] || 0);
      softirqs[irq].push({ x, y: Math.max(0, parseFloat((delta / dt).toFixed(1))) });
    }
  }

  const datasets = [];
  const sortedIrqs = Object.entries(softirqs)
    .sort((a, b) => {
      const aAvg = a[1].reduce((s, p) => s + p.y, 0) / a[1].length;
      const bAvg = b[1].reduce((s, p) => s + p.y, 0) / b[1].length;
      return bAvg - aAvg;
    })
    .slice(0, 8)
    .map(([irq]) => irq);

  sortedIrqs.forEach(irq => {
    datasets.push(lineDataset(irq, softirqColors[irq] || C.muted, softirqs[irq], { fill: true }));
  });

  if (datasets.length === 0) {
    datasets.push(lineDataset('No data', C.muted, [], {}));
  }

  makeChart('softirqChart', 'line', {
    datasets,
  }, {
    scales: {
      x: timeXAxis(),
      y: { ...yAxis('/sec', 0), ticks: { maxTicksLimit: 6 }, grid: { color: '#2a2d3a' } },
    },
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}/s` } },
      legend: { labels: { boxWidth: 10, padding: 12 } },
    },
  });
}

// ── Status bar ───────────────────────────────────────────────────────────────
function setStatus(state, text) {
  const el = document.getElementById('status');
  el.className = state;
  document.getElementById('status-text').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearError() {
  document.getElementById('error-banner').style.display = 'none';
}

// ── Render all charts from cached data ───────────────────────────────────────
function renderAll(points) {
  if (!points.length) return;
  renderCpu(points);
  renderMemory(points);
  renderDisk(points);
  renderIOPS(points);
  renderNetwork(points);
  renderNetworkPackets(points);
  renderNetworkErrors(points);
  renderLoad(points);
  renderContext(points);
  renderSoftirq(points);
  renderFilesystems(points);
}

// ── Main refresh (fetches new data, re-renders only if something changed) ────
async function refresh() {
  setStatus('', 'Loading…');
  clearError();
  try {
    const added = await fetchNewData();

    if (!cachedPoints.length) {
      setStatus('error', 'No data files found');
      showError('No JSON files found in collected-data/. Run the monitor with log_level = DEBUG in config.ini to generate data.');
      return;
    }

    if (added > 0) {
      renderAll(cachedPoints);
    }

    const latest = new Date(cachedPoints[cachedPoints.length - 1].collected_at * 1000);
    const ts = latest.toLocaleTimeString();
    const note = added === 0 ? ' · no new data' : '';
    setStatus('ok', `${cachedPoints.length} samples · last ${ts}${note}`);
  } catch (err) {
    setStatus('error', 'Error loading data');
    showError(`Failed to load data: ${err.message}`);
    console.error(err);
  }
}

// ── Auto-refresh ─────────────────────────────────────────────────────────────
if (CONFIG.refreshInterval > 0) {
  setInterval(refresh, CONFIG.refreshInterval * 1000);
}

// Initial load
refresh();
</script>
