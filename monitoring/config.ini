[daemon]
# Collection interval in seconds. Minimum enforced at 5 seconds.
# Default: 60
run_interval = 60

# Maximum number of collection iterations before exiting.
# Comment out or remove to run indefinitely.
# max_iterations = 100

[logging]
# Log level: DEBUG or ERROR
# If set to DEBUG, JSON output files are saved as uuid-timestamp.json
# Default: ERROR
# level = DEBUG
