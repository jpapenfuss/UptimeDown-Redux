[daemon]
# Collection interval in seconds. Minimum enforced at 5 seconds.
# Default: 60
run_interval = 60

# Maximum number of collection iterations before exiting.
# Comment out or remove to run indefinitely.
# max_iterations = 100

[logging]
# Log level: DEBUG or ERROR
# Default: ERROR
# level = DEBUG

[output]
# Write each collection as a JSON file in collected-data/.
# Equivalent to passing --dump on the command line.
# Default: false
# dump_json = true
