[daemon]
# Collection interval in seconds. Minimum enforced at 5 seconds.
# Default: 60
run_interval = 60

# Maximum number of collection iterations before exiting.
# Comment out or remove to run indefinitely.
# max_iterations = 100

# How often (seconds) the main loop wakes up to check if any gatherer is due.
# Smaller = tighter firing times (less variance); larger = lighter CPU use but
# each gatherer may fire up to base_tick seconds late. Default: 1.
# base_tick = 1

[logging]
# Log level: DEBUG or ERROR
# Default: ERROR
# level = DEBUG

[output]
# Write each collection as a JSON file.
# Equivalent to passing --dump on the command line.
# Default: false
# dump_json = true

# Directory to write JSON dump files to.
# Supports absolute paths (e.g., /var/log/uptimedown) or relative paths.
# Default: collected-data
# data_dir = /var/log/uptimedown

[intervals]
# Per-gatherer collection intervals in seconds. Each defaults to run_interval
# if not set. Minimum 5 seconds enforced. Intervals do not need to be
# multiples of each other — the scheduler checks every second and fires
# any gatherer whose elapsed time is >= its configured interval.
#
# cpu = 5
# memory = 30
# disk = 60
# filesystems = 300
# network = 15
# cloud = 3600
